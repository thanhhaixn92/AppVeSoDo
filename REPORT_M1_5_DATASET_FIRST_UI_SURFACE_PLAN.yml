ui_options_evaluated:
  Option_A: "Read-only DatasetCandidatePanel beside/above existing list. Creates dual/competing UI representations."
  Option_B: "Replace visible candidate list with dataset cards while mapping back to legacy candidates. Better UX, but risky if done purely inside App.tsx."
  Option_C: "Extract candidate rendering to a dedicated component/container using dataset-first selector. Keeps App.tsx clean and encapsulates mapping."

recommended_ui_option:
  recommendation: "Option C, but strictly limited to an additive extraction. We will create `<DatasetFirstCandidateList />` which consumes legacy `visualCandidates` and the *unchanged* preview/apply callbacks. Inside, it uses the dataset selector to render cards. No legacy workflow logic is replaced; it merely groups the presentation."

