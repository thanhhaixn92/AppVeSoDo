qa_policy_update_2026_06:
  status: active
  rationale: >
    Static audit and unit tests were not sufficient to catch user-facing UI/candidate/canvas issues.
    Playwright E2E reproduced a missing-payload candidate apply bug that manual screenshot review and unit tests did not fully prevent.
  tool_routing:
    chatgpt_project: "coordination, audit, prompt writing, decision synthesis"
    codex: "audit-only, implementation planning, report-only PRs"
    antigravity: "local code implementation, Playwright E2E, browser verification, fix-retest cycles"
    google_ai_studio: "ZIP import, preview smoke, Gemini prompt/runtime checks, UI comparison"
  pass_rule:
    user_facing_flow: "requires Playwright E2E or browser verification before PASS"
    static_unit_only: "may be PARTIAL_PASS but not final PASS for UI/candidate/canvas flows"
  e2e_reporting_rule:
    targeted_e2e: "required for the affected user flow"
    full_e2e: "run when feasible; if mixed/failing, classify each failure honestly"
    blocked_environment: "report exact command/error; do not claim E2E pass"
  required_evidence:
    - "commands run"
    - "build result"
    - "unit test result"
    - "targeted E2E result when relevant"
    - "full E2E result when feasible"
    - "screenshots/videos/traces for UI bugs when available"
  known_current_e2e_baseline:
    missing_payload_guard_targeted_e2e: "PASS on chromium and ipad"
    full_e2e: "PASS in latest run: 17 passed, 5 skipped"
    full_e2e_notes: "Chart workflow E2E stabilized. Teardown timeouts resolved via deterministic split and serial execution. Live AI diagram specs appropriately skipped."
    ai_studio_smoke: "PASS (app launch, transport, cache, quota, missing payload guard verified. Preview/apply not available due to no ready candidate)."

main_branch_sync_policy_2026_06:
  status: active
  rationale: "Ensure all changes merged to main have been strictly verified in the AI Studio environment via ZIP import. PRs bypassing this can introduce transport/proxy breaks."
  ownership: "GitHub `main` is exclusively AI Studio sync-owned."
  antigravity_rules:
    - "Must not merge PRs directly to `main`."
    - "Must not push directly to `main`."
    - "Branches and PRs are for local implementation, backup, code review, and reference only."
    - "Codex review is an audit-only step and does not grant merge authority."
  safe_workflow:
    1: "Antigravity implements and tests locally."
    2: "Antigravity creates ZIP."
    3: "AI Studio imports ZIP, performs smoke tests, and syncs to `main`."
    4: "Antigravity fetches `main` afterward to synchronize."
