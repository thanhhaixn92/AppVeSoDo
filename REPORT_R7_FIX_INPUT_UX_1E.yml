Remaining Risks:
Khi cờ stale bật lên, UI KHÔNG hề báo đỏ cho người dùng biết là format gốc đã bị vô hiệu quả. Để an toàn, giai đoạn tiếp nên có cách đồng bộ hóa UI với việc stale status.
