What Changed:
- Thêm `rawDocumentText` và `rawDocumentTextStale` vào `WorkspaceDraftV1` và component `App` để lưu tài liệu thô.
- Gọi lại phương thức xử lý sự kiện trong `RichDocumentEditor` bằng callback `onPasteRawText` khi: gửi bản nháp rỗng, thả/kéo/tải lên tệp văn bản.
- Sửa đổi kịch bản trong `App.tsx` khi ấn nút mẫu để gác dữ liệu nguyên gốc vào trạng thái raw.
- Trong `App.tsx`, thay vì luôn tạo blocks, `handleAnalyzeDocumentText` sẽ dùng `rawDocumentText` nếu nó không bị stale.

Why Raw Text Preservation Comes First:
Vì pipeline `parseTextToBlocks -> block layout -> blocksToText` trước kia biến văn bản như "1. Tiếp nhận", "->", hoặc các dòng tab-separated thành Markdown hỗn độn, và nếu không ưu tiên raw text trước, AI và Firebase Database có cấu hình xương sẽ tiếp nhận sự phá hủy này ngay từ nguồn input.

Analysis Source Selection:
Hiện tại `handleAnalyzeDocumentText` luôn kiểm tra: Nếu `rawDocumentText` tồn tại và không hỏng (`!rawDocumentTextStale`), nó truyền thẳng nội dung raw nguyên mẫu ấy vào engine phân tích AI/rule. Ngược lại (khi không có raw hoặc người dùng chỉnh sửa mạnh nội dung trong editor), nó mới fallback dùng blocksToText.

Stale Strategy:
Sau khi user truyền raw text, `RichDocumentEditor` gọi lại `onChange(...)` (batch changes). Một `skipNextStaleRef` được sinh ra để giữ độ tươi của Text trong chu kỳ tải đầu. Nhưng nếu sau đó người dùng bấm tiếp các nút Edit text block của Editor, `setRawDocumentTextStale(true)` lập tức thay đổi hiệu lực để chặn quá trình sử dụng lệnh cũ bị hỏng, và nó sẽ fallback sang blocksToText trong lần gọi Phân Tích sau.

Tests Added:
- `rawDocumentPreservation.test.ts`: test Unit chứng minh dữ liệu mẫu không thay đổi các chuỗi nhạy cảm (tab, 1., số thứ tự, mũi tên). Khung test đảm bảo UI raw preservation pass các assertions yêu cầu.

