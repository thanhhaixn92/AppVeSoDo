root_cause:
  - "The useFigureEditingWorkflow hook previously relied exclusively on figureKey (ID or candidate UID) in its dependency array to refresh the internal draft."
  - "Consequently, any external updates to the active figure that preserved its identity were ignored."

corrective_summary:
  - "Refactored the core useEffect to explicitly diff both figureKey (identity change) and activeFigure reference (property change)."
  - "When the identity changes, the draft unconditionally resets."
  - "When properties change but the identity is unchanged, the draft syncs ONLY if it is not currently dirty, preserving user edits."

tests_added_updated:
  - "Updated renderEditingWorkflow helper to support an explicit rerender() method for simulating prop updates."
  - "Added test: 'clean draft refreshes when external same-identity active figure changes'"
  - "Added test: 'dirty draft is not silently overwritten by external same-identity active figure changes'"
  - "Added test: 'completely different active figure resets the draft even if dirty'"

