current_architecture_summary: |
  The current system follows a VisualCandidate-first architecture. The AI and rule engines generate a monolithic `VisualCandidate` object that is stored directly in `useCandidateWorkflow`. This object serves multiple purposes: it holds the raw source data (provenance), the AI's rendering recommendation, the actual renderable payload, and the workflow state. `candidateToRenderableAdapter.ts` then extracts the renderable payload from this monolith for the canvas.

visual_candidate_conflation_points: |
  The `VisualCandidate` type currently mixes:
  1. Dataset/Provenance: `sourceText`, `sourceExcerpt`, `sourceSectionHeading`, `extractedItems`.
  2. Figure Recommendation: `visualType`, `confidence`, `rationale`, `recommendedTemplates`.
  3. Renderable Payload: `data: { type, chart, diagram, table }` and `title`.
  4. Workflow State & Status: `status`, `uiStatus`, `warnings`.

m1c_compatibility_strategy: |
  `candidateToRenderableAdapter.ts` acts as the M1C adapter boundary. In the new dataset-first architecture, it will be updated to accept either a legacy `VisualCandidate` or a structured pair of `(DatasetCandidate, FigureRecommendation)` and construct the exact same `RenderableFigurePayload`. This pure functional approach guarantees compatibility without breaking the existing preview and apply workflows.

m1d_lite_safety_strategy: |
  M1D-LITE editing workflow relies on the typed `SavedFigure` (via `useFigureEditingWorkflow`) after the candidate has been applied to the canvas. Because our migration slice only affects the pre-apply candidate generation boundary, the post-apply editing workflow will be completely unaffected.

governance_constraints_applied: |
  - AGENTS.md: Stop and report instead of guessing when scope expands. Keep M1.5 strictly bounded.
  - protected-areas.md: Do not touch export DOM contract, renderer wrappers, Firebase, Auth, server, real AI, or document workflow.
  - current-roadmap.md: Confirmed M1.5 Dataset-first migration must execute entirely before starting M1E AI chat.
  - file-ownership.yml: `src/types.ts` requires explicit task scope. `src/hooks/useCandidateWorkflow.ts` is owned by M1B-2 and needs tests.
  - file-locks.yml: No conflicting active locks.

test_coverage_review: |
  - `tests/candidateModel.test.ts`: Protects candidate UI status, preview/apply policy, stable IDs, and dedupe metadata preservation. Will remain passing.
  - `tests/candidateToRenderableAdapter.test.ts`: Protects the boundary between candidate generation and the renderable payload. MUST be extended in Slice 1 to ensure the new dataset-first splitter produces the exact same renderable payload.
  - `tests/figureEditingWorkflow.test.ts`: Protects deep-cloned editable drafts. Must remain untouched and passing.
  - `tests/documentWorkflow.test.ts`: Protects raw preservation boundary. Must remain untouched and passing.

slice_1_plan_final: |
  To strictly comply with governance and avoid unintended runtime breaks, Slice 1 will be purely structural and test-driven:
  a. Add `DatasetCandidate`, `FigureRecommendation`, `FigureTypeOption`, and `DatasetSelection` to `src/types.ts`.
  b. Create a pure compatibility adapter function (e.g., `deriveDatasetFirstFromLegacy(candidate)`) that converts legacy `VisualCandidate` into the new types without mutating state.
  c. Add unit tests covering the new types and the pure splitter function.
  d. Do NOT change runtime behavior in `useCandidateWorkflow` or `App.tsx`. Wire-up will happen in Slice 2 after the types and pure functions are proven safe.

