  parser_preservation: "Poor. `blocksToText` fails to accurately reproduce original formatting. Loose tables separated by single newlines become double-spaced due to array joining, and bullet prefixes are destructively normalized to `- `."
  section_parser: "The section grouping works properly but operates upon the destructive output of `blocksToText`, yielding parsed sections with flattened content structure."
