secret_env_var_clarification:
  GEMINI_API_KEY: "Primary API key. AI Studio automatically injects this."
  GEMINI_PRIMARY_MODEL: "Primary model to use (default: gemini-2.5-flash). Do not use GEMINI_PRIMARY."
  GEMINI_FALLBACK_MODEL: "Fallback model to use (default: gemini-2.5-flash-lite). Do not use GEMINI_FALLBACK."
  GEMINI_PRIMARY: "Legacy API key fallback in code. Do NOT use this for model names."
  GEMINI_FALLBACK: "Legacy API key fallback in code. Do NOT use this for model names."

old_response_contract:
  success: "{ success: true, data: [...] }"
  error: "HTTP 503 or 500 with JSON payload"

new_response_contract:
  success: "{ ok: true, candidates: [...] }"
  error: "HTTP 200 (if quota/proxy-sensitive) or 503, with { ok: false, errorCode: string, message: string, retryAfterSeconds: number }"

quota_cooldown_behavior:
  - "Frontend now checks if JSON parsing is possible before relying strictly on response.ok."
  - "If errorCode is AI_QUOTA_EXCEEDED or AI_ROUTE_NON_JSON_RESPONSE is caught, cooldown is triggered."
  - "Blocks subsequent requests for 60 seconds."

ai_studio_proxy_compatibility_rationale:
  - "Quota errors return HTTP 200 with ok: false so the proxy won't intercept and replace them with generic HTML, allowing the frontend to read the structured error code."

same_model_fallback_behavior:
  - "server.ts explicitly skips fallback if GEMINI_PRIMARY_MODEL === GEMINI_FALLBACK_MODEL or fallback is empty."

cache_history_behavior:
  - "Successful responses are cached in localStorage."
  - "Key uses normalized text to handle minor whitespace differences."
  - "Cache TTL: 24 hours."
  - "Max entries: 20 (evicts oldest)."
  - "Only successful responses with candidates are cached."
  - "Errors, quota limits, and non-JSON responses are NOT cached."

